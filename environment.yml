name: env
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - pip
  - python=3.11
  - numpy>=1.24
  - scipy>=1.10
  - pandas>=2.0
  - matplotlib>=3.7
  - seaborn>=0.12
  - tqdm>=4.65
  - pyyaml>=6.0
  - scikit-learn>=1.3
  - jupyterlab
  - ipykernel
  - pytorch>=2.2
  - torchvision
  - torchaudio
  - pytorch-cuda=11.8
  - pip:
      - transformers>=4.40
      - datasets>=2.18
      - accelerate>=0.30
      - sentence-transformers>=2.6
      - huggingface-hub>=0.22
      - safetensors>=0.4
      - peft>=0.10
