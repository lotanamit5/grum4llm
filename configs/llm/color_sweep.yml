run_prefix: "colors_qwen_pca"
output_root: "results/llm"
worker_script: "scripts/run_color_experiment.py"
aggregations: ["criteria_curve"]
max_parallel_subprocesses: 4

base_run:
  dataset_path: "data/color_dataset_qwen_pca.json"
  model_name: "Qwen/Qwen2.5-0.5B"
  embedding_method: "hidden_state_pca"

sweep:
  seeds:
    start: 0
    stop: 4
    step: 1
  parameters:
    criterion: ["random", "d_opt", "e_opt", "social", "personalized"]
    n_rounds: [49]
