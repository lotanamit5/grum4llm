experiment:
  run_prefix: "llm_colors_st"
  output_root: "results/llm"
  worker_script: "scripts/worker_llm_slurm.sh"

base:
  model_id: "Qwen/Qwen2.5-0.5B"
  domain: "colors_pairwise"
  steps: 20
  pca_dim: 8
  embedding_method: "sentence_transformer_pca"
  mcem:
    n_iterations: 8
    n_gibbs_samples: 30
    n_gibbs_burnin: 15

sweep:
  seed: [0, 1, 2, 3, 4]
  criterion: ["social", "personalized", "random"]
