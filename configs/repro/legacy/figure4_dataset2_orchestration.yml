# Fig. 4 reproduction: criterion "social" = Eq. (5) on δ (paper's personalized-plot ablation).
# Criterion "personalized" = PersonalizedChoiceCriterion (Eq. 6-style); see paper §6.2.
run_prefix: fig4-dataset2-repro
output_root: results/repro
worker_script: scripts/run_personalized_choice_experiment.py
max_parallel_subprocesses: 128
aggregations: [criteria_curve, timing]

base_run:
  mode: criteria_curve
  dataset: dataset2
  repeats: 1
  rounds: 100
  n_jobs: 1
  iterations: 6
  gibbs_samples: 25
  gibbs_burnin: 12
  sigma: 1.0
  prior_precision: 0.01
  tolerance: 1.0e-5
  random_seed: 0
  quiet: true
  no_progress: true

sweep:
  seeds:
    start: 0
    stop: 19
    step: 1
  parameters:
    criterion: [random, d_opt, e_opt, social, personalized]
