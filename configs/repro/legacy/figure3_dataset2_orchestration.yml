# Fig. 3 (paper Table 1): random, D-opt, E-opt, proposed social (Eq. 5)—no "personalized" curve.
run_prefix: fig3-dataset2-repro
output_root: results/repro
worker_script: scripts/run_social_choice_experiment.py
max_parallel_subprocesses: 128
aggregations: [criteria_curve, timing]

base_run:
  mode: criteria_curve
  dataset: dataset2
  repeats: 1
  rounds: 100
  n_jobs: 1
  iterations: 6
  gibbs_samples: 25
  gibbs_burnin: 12
  sigma: 1.0
  prior_precision: 0.01
  tolerance: 1.0e-5
  random_seed: 0
  quiet: true
  no_progress: true

sweep:
  seeds:
    start: 0
    stop: 19
    step: 1
  parameters:
    criterion: [random, d_opt, e_opt, social]
