run_prefix: fig4-dataset1-repro
output_root: results/repro
worker_script: scripts/run_personalized_choice_experiment.py
max_parallel_subprocesses: 32
aggregations: [criteria, timing]

base_run:
  mode: criteria
  dataset: dataset1
  repeats: 1
  n_jobs: 32
  iterations: 6
  gibbs_samples: 25
  gibbs_burnin: 12
  sigma: 1.0
  prior_precision: 0.01
  tolerance: 1.0e-5
  random_seed: 0
  quiet: true
  no_progress: true

sweep:
  seeds:
    start: 0
    stop: 4
    step: 1
  parameters:
    criterion: [random, d_opt, e_opt, social, personalized]
    rounds:
      start: 1
      stop: 100
      step: 1
